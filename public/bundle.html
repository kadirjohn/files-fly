<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Bundle — Files Fly</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/base.css?v=20260624">
  <link rel="stylesheet" href="/css/components.css?v=20260625">
  <link rel="stylesheet" href="/css/utilities.css?v=20260624">
  <link rel="stylesheet" href="/css/file-page.css?v=20260624">
  <link rel="stylesheet" href="/css/bundle.css?v=20260625">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header"><a href="/" class="app-logo" aria-label="Files Fly"><img src="/filesfly-logo.png" alt="Files Fly" class="app-logo-img"><span class="logo-text">Files Fly</span></a></header>
  <main class="container bundle-page">
    <div id="loading" class="glass-card text-center"><div class="spinner" aria-hidden="true"></div><p class="mt-2 text-muted">Yükleniyor…</p></div>
    <div id="error-state" class="glass-card text-center hidden">
      <div class="error-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="52" height="52"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <h2 id="error-title">Bulunamadı</h2>
      <p id="error-message" class="text-muted"></p>
      <a href="/" class="btn btn-primary mt-2">Ana Sayfa</a>
    </div>

    <div id="bundle-info" class="glass-card hidden">
      <div class="bundle-header">
        <div>
          <h1 id="bundle-title">Bundle</h1>
          <p id="bundle-meta" class="text-muted text-sm"></p>
        </div>
        <span id="encrypted-badge" class="encrypted-badge hidden">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>Parola korumalı</span>
        </span>
      </div>
      <p id="countdown" class="text-muted text-xs"></p>

      <div class="bundle-actions">
        <label class="select-all"><input type="checkbox" id="select-all"> Tümünü seç</label>
        <button id="download-selected" class="btn btn-primary btn-sm" disabled>Seçilenleri indir</button>
        <button id="download-all" class="btn btn-secondary btn-sm">Hepsini indir</button>
      </div>

      <div id="file-list" class="bundle-file-list"></div>
    </div>

    <!-- Password gate (encrypted bundles) -->
    <div id="password-gate" class="glass-card hidden">
      <div class="password-gate-icon-wrap" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2 class="text-center mb-1">Kilidi Aç</h2>
      <p class="text-center text-muted text-sm mb-2">Bu bundle parola korumalı. Parolayı girin.</p>
      <div class="form-group">
        <div class="password-input-row">
          <input type="password" id="gate-password" class="form-input" placeholder="Parola" autocomplete="off">
          <button type="button" id="gate-toggle" class="btn btn-ghost btn-icon" aria-label="Parolayı göster/gizle" title="Parolayı göster/gizle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <p id="gate-error" class="text-error text-sm text-center hidden"></p>
      <div class="text-center mt-2">
        <button id="gate-submit" class="btn btn-primary btn-full">Kilidi Aç</button>
      </div>
    </div>

    <!-- Preview modal -->
    <div id="preview-panel" class="preview-panel hidden" role="dialog" aria-modal="true">
      <div class="preview-modal-box">
        <div class="preview-modal-header">
          <h3 id="preview-title"></h3>
          <button id="preview-close" class="preview-close-btn" aria-label="Kapat">✕</button>
        </div>
        <div id="preview-content"></div>
      </div>
    </div>
  </main>
  <script src="/js/debug.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/preview-render.js"></script>
  <script src="/js/bundle.js"></script>
</body>
</html>
