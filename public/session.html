<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A0A">
    <title>Dosyalarım — Files Fly</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="app-header">
    <a href="/" class="app-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="logoGrad2" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#f59e0b"/>
                    <stop offset="100%" stop-color="#fbbf24"/>
                </linearGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="url(#logoGrad2)"/>
            <path d="M10 8h4l4 6v4l-4 6h-4l4-6v-4l-4-6z" fill="#0A0A0A"/>
            <path d="M18 8h4l-4 16h-4l4-16z" fill="#0A0A0A" opacity="0.6"/>
        </svg>
        <span>Files Fly</span>
    </a>
    <nav class="app-nav">
        <a href="/" class="nav-link-files">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Ana Sayfa</span>
        </a>
    </nav>
</header>

<main class="container">
    <div class="glass-card">
        <h1 class="mb-2 flex-icon-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Dosyalarım
        </h1>
        <p class="text-muted text-sm mb-3">
            Bu oturumda yüklediğiniz dosyalar. Dosyalarınız belirlediğiniz süre dolduğunda otomatik olarak silinir.
        </p>

        <!-- Dosya Listesi -->
        <div id="file-list" class="file-list">
            <!-- JS tarafından doldurulacak -->
        </div>

        <!-- Yükleniyor -->
        <div id="loading-state" class="text-center text-muted mt-3 loading-state">
            <div class="spinner"></div>
            <span>Dosyalarınız yükleniyor...</span>
        </div>

        <!-- Boş durum -->
        <div id="empty-state" class="text-center mt-3 hidden">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="52" height="52"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            </div>
            <p class="text-muted">Henüz hiç dosya yüklemediniz.</p>
            <a href="/" class="btn btn-primary mt-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                Dosya Yükle
            </a>
        </div>

        <!-- Hata durumu -->
        <div id="error-state" class="text-center mt-3 hidden">
            <div class="error-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="42" height="42"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <p class="text-error" id="error-text">Dosyalar yüklenirken bir hata oluştu.</p>
            <button id="retry-load-btn" class="btn btn-secondary mt-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.72"/></svg>
                Tekrar Dene
            </button>
        </div>

        <!-- Sayfalama -->
        <div id="pagination" class="flex-center gap-1 mt-3 hidden">
            <button id="prev-page-btn" class="btn btn-ghost btn-sm" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
                Önceki
            </button>
            <span id="page-info" class="text-sm text-muted"></span>
            <button id="next-page-btn" class="btn btn-ghost btn-sm" disabled>
                Sonraki
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
    </div>
</main>

<!-- Önizleme Modal -->
<div id="preview-panel" class="preview-panel hidden" role="dialog" aria-modal="true">
    <div class="preview-modal-box">
        <div class="preview-modal-header">
            <h3 id="preview-title" class="preview-modal-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" style="vertical-align:middle;margin-right:6px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Dosya Önizleme
            </h3>
            <button id="preview-close-btn" class="preview-close-btn" aria-label="Kapat">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="preview-content" class="preview-content"></div>
        <div class="preview-modal-actions">
            <a id="preview-download-btn" class="btn btn-success btn-sm" href="#" download>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                İndir
            </a>
            <button id="preview-close-btn2" class="btn btn-ghost btn-sm">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Kapat
            </button>
        </div>
    </div>
</div>

<script src="/js/session.js"></script>

</body>
</html>
