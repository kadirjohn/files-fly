version: '3.8'

services:
  # =========================================================================
  # Node.js Uygulama Container'ı
  # =========================================================================
  filesfly:
    build: .
    container_name: filesfly-app
    ports:
      - "9392:9392"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Container-internal settings (override the .env values below for Docker).
      DATABASE_URL: postgresql://filesfly:filesfly_secret@postgres:5432/filesfly
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=4096
      UPLOADS_DIR: /data/uploads
      # Default backend on first boot. 'local' = disk (zero config).
      # After first boot, switch backend from the admin panel (Settings → Storage).
      STORAGE_BACKEND: local
    env_file:
      # System-level secrets read from .env (single source of truth).
      # The user fills these once; R2/Supabase credentials are NOT put here —
      # they are entered from the admin panel and stored encrypted in the DB.
      - .env
    volumes:
      - uploads_data:/data/uploads
      - thumbs_data:/data/thumbs
    networks:
      - filesfly-net

  # =========================================================================
  # PostgreSQL Veritabanı Container'ı
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: filesfly-db
    restart: always
    user: postgres                              # Non-root!
    environment:
      POSTGRES_USER: filesfly
      POSTGRES_PASSWORD: filesfly_secret
      POSTGRES_DB: filesfly
    ports:
      - "127.0.0.1:5433:5432"                  # Host port 5433 → container 5432 (5432 zaten kullanılıyorsa)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filesfly -d filesfly"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - filesfly-net

volumes:
  pgdata:
  uploads_data:
  thumbs_data:

networks:
  filesfly-net:
    driver: bridge
