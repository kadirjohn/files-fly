version: '3.8'

services:
  # =========================================================================
  # Node.js Uygulama Container'ı
  # =========================================================================
  filesfly:
    build: .
    container_name: filesfly-app
    ports:
      - "9392:9392"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://filesfly:filesfly_secret@postgres:5432/filesfly
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=4096
      JWT_SECRET: changeme-in-production       # CHANGE THIS! Generate with: openssl rand -base64 64
      IP_HASH_SECRET: changeme-ip-secret       # CHANGE THIS! Generate with: openssl rand -base64 64
      BASE_URL: http://localhost:9392          # Change to your actual domain in production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123                 # CHANGE THIS!
      # --- Object Storage / Bucket ---
      # Active backend. Also configurable from admin panel (storage_backend config key).
      # 'local' = files on disk (UPLOADS_DIR). 'r2' = Cloudflare R2. 'supabase' = Supabase Storage.
      STORAGE_BACKEND: local
      UPLOADS_DIR: /data/uploads
      # Cloudflare R2 (uncomment + fill to use STORAGE_BACKEND=r2):
      # R2_ACCOUNT_ID:
      # R2_ACCESS_KEY_ID:
      # R2_SECRET_ACCESS_KEY:
      # R2_BUCKET_NAME:
      # R2_PUBLIC_BASE_URL:
      # Supabase Storage (uncomment + fill to use STORAGE_BACKEND=supabase):
      # SUPABASE_S3_ENDPOINT:
      # SUPABASE_S3_REGION: us-east-1
      # SUPABASE_S3_ACCESS_KEY_ID:
      # SUPABASE_S3_SECRET_ACCESS_KEY:
      # SUPABASE_S3_BUCKET:
    volumes:
      - uploads_data:/data/uploads
      - thumbs_data:/data/thumbs
    networks:
      - filesfly-net

  # =========================================================================
  # PostgreSQL Veritabanı Container'ı
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: filesfly-db
    restart: always
    user: postgres                              # Non-root!
    environment:
      POSTGRES_USER: filesfly
      POSTGRES_PASSWORD: filesfly_secret
      POSTGRES_DB: filesfly
    ports:
      - "127.0.0.1:5433:5432"                  # Host port 5433 → container 5432 (5432 zaten kullanılıyorsa)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filesfly -d filesfly"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - filesfly-net

volumes:
  pgdata:
  uploads_data:
  thumbs_data:

networks:
  filesfly-net:
    driver: bridge
